version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: terraform-backend
    ports:
      - "8001:8001"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    env_file:
      - .env
    volumes:
      # Mount for development (optional - comment out for production)
      - ./backend:/app
      - /app/__pycache__
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - terraform-network
    # For production, remove the volume mount above and use:
    # command: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app:app --bind 0.0.0.0:8001

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: terraform-frontend
    ports:
      - "5500:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"] || exit 0
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - terraform-network

networks:
  terraform-network:
    driver: bridge

# For development with hot-reload, use this instead:
# services:
#   backend:
#     command: uvicorn app:app --host 0.0.0.0 --port 8001 --reload
#     volumes:
#       - ./backend:/app
