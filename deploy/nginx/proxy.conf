# Nginx config for unified app container
# Serves frontend static files + reverse proxies API routes to backend

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Backend: generate endpoint
    location = /generate {
        proxy_pass http://localhost:8001/generate;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Backend: health check
    location = /health {
        proxy_pass http://localhost:8001/health;
        access_log off;
    }

    # Backend: all other API routes
    location /api/ {
        proxy_pass http://localhost:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Env config served dynamically
    location /env-config.js {
        expires -1;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Fallback: serve frontend files, fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
